name: tester_mandi
description: TesterMandi - Connect Android Developers with Testers.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  get: ^4.6.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3

  # Google Sign In
  google_sign_in: ^6.2.1

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Image
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  flutter_image_compress: ^2.3.0

  # Storage
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  http: ^1.2.2
  flutter_local_notifications: ^18.0.1

  # Ads
  google_mobile_ads: ^5.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1E1B4B"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 23
  web:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#08080F"
  image: "assets/images/splash_logo.png"
  image_dark: "assets/images/splash_logo_dark.png"
  android_12:
    image: "assets/images/splash_logo.png"
    icon_background_color: "#FFFFFF"
    image_dark: "assets/images/splash_logo_dark.png"
    icon_background_color_dark: "#08080F"
  fullscreen: true
  android: true
  ios: true
